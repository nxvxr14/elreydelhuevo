<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL REY DEL HUEVO - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .seed-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        
        .seed-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .seed-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        
        .seed-buttons .btn {
            flex: 1;
            min-width: 120px;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
        }
        
        .btn-outline-success {
            background: transparent;
            color: var(--success);
            border: 1px solid var(--success);
        }
        
        .btn-outline-success:hover {
            background: var(--success);
            color: white;
        }
        
        .btn-outline-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        
        .btn-outline-danger:hover {
            background: var(--danger);
            color: white;
        }
        
        .seed-status {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.75rem;
            min-height: 1.5rem;
        }
        
        .seed-status.success {
            color: var(--success);
        }
        
        .seed-status.error {
            color: var(--danger);
        }
        
        .seed-status.loading {
            color: var(--warning);
        }
        
        .data-indicator {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .data-indicator.has-data {
            background: var(--success-bg);
            color: var(--success);
        }
        
        .data-indicator.no-data {
            background: var(--warning-bg);
            color: var(--warning);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <div class="logo-icon">🥚</div>
                <h1>EL REY DEL HUEVO</h1>
                <p>Sistema Interno de Validación Trabajadores</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" class="form-control" 
                           placeholder="Ingrese su usuario" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" 
                           placeholder="Ingrese su contraseña" required>
                </div>
                
                <div id="loginError" class="alert alert-danger" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-sign-in-alt"></i>
                    Iniciar Sesión
                </button>
            </form>
            
            <!-- Sección de datos de ejemplo -->
            <div class="seed-section">
                <h3><i class="fas fa-database"></i> Datos de Demostración</h3>
                <div class="text-center">
                    <span id="dataIndicator" class="data-indicator no-data">
                        <i class="fas fa-circle"></i> Verificando...
                    </span>
                </div>
                <div class="seed-buttons">
                    <button type="button" id="btnLoadData" class="btn btn-outline-success">
                        <i class="fas fa-download"></i>
                        Cargar Datos
                    </button>
                    <button type="button" id="btnClearData" class="btn btn-outline-danger">
                        <i class="fas fa-trash-alt"></i>
                        Limpiar Datos
                    </button>
                </div>
                <div id="seedStatus" class="seed-status"></div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Verificar si hay datos cargados
        async function checkDataStatus() {
            const indicator = document.getElementById('dataIndicator');
            try {
                const response = await fetch('/api/seed/check');
                const data = await response.json();
                
                if (data.success) {
                    if (data.hasData) {
                        indicator.className = 'data-indicator has-data';
                        indicator.innerHTML = '<i class="fas fa-check-circle"></i> Datos cargados';
                    } else {
                        indicator.className = 'data-indicator no-data';
                        indicator.innerHTML = '<i class="fas fa-exclamation-circle"></i> Sin datos de ejemplo';
                    }
                }
            } catch (error) {
                indicator.className = 'data-indicator no-data';
                indicator.innerHTML = '<i class="fas fa-times-circle"></i> Error al verificar';
            }
        }
        
        // Cargar datos de ejemplo
        document.getElementById('btnLoadData').addEventListener('click', async function() {
            const btn = this;
            const status = document.getElementById('seedStatus');
            
            if (!confirm('¿Cargar datos de ejemplo? Esto reemplazará los datos actuales.')) {
                return;
            }
            
            btn.disabled = true;
            status.className = 'seed-status loading';
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando datos...';
            
            try {
                const response = await fetch('/api/seed/load', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                if (data.success) {
                    status.className = 'seed-status success';
                    status.innerHTML = `<i class="fas fa-check"></i> ${data.summary.products} productos, ${data.summary.clients} clientes, ${data.summary.sales} ventas cargadas`;
                    checkDataStatus();
                } else {
                    status.className = 'seed-status error';
                    status.textContent = data.message || 'Error al cargar datos';
                }
            } catch (error) {
                status.className = 'seed-status error';
                status.textContent = 'Error de conexión';
            }
            
            btn.disabled = false;
        });
        
        // Limpiar datos
        document.getElementById('btnClearData').addEventListener('click', async function() {
            const btn = this;
            const status = document.getElementById('seedStatus');
            
            if (!confirm('¿Eliminar TODOS los datos? Esta acción no se puede deshacer.')) {
                return;
            }
            
            btn.disabled = true;
            status.className = 'seed-status loading';
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Eliminando datos...';
            
            try {
                const response = await fetch('/api/seed/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                if (data.success) {
                    status.className = 'seed-status success';
                    status.innerHTML = '<i class="fas fa-check"></i> Todos los datos han sido eliminados';
                    checkDataStatus();
                } else {
                    status.className = 'seed-status error';
                    status.textContent = data.message || 'Error al eliminar datos';
                }
            } catch (error) {
                status.className = 'seed-status error';
                status.textContent = 'Error de conexión';
            }
            
            btn.disabled = false;
        });
        
        // Verificar al cargar la página
        document.addEventListener('DOMContentLoaded', checkDataStatus);
    </script>
</body>
</html>
