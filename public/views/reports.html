<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - EL REY DEL HUEVO</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Report Navigation */
        .report-nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        
        .report-nav-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .report-nav-item:hover {
            background: var(--bg-input);
            color: var(--text-primary);
            border-color: var(--bg-hover);
        }
        
        .report-nav-item.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
        
        .report-nav-item i { font-size: 1rem; }
        
        /* Filters Panel */
        .filters-panel {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        
        .filters-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-color);
        }
        
        .filters-header h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .filters-body { padding: 1.25rem; }
        
        .filters-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 140px;
        }
        
        .filter-item label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-item .form-control {
            padding: 0.6rem 0.875rem;
            font-size: 0.9rem;
        }
        
        .filter-separator {
            width: 1px;
            height: 38px;
            background: var(--border-color);
            margin: 0 0.5rem;
        }
        
        .stat-icon.info {
            background: var(--info-bg);
            color: var(--info);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .report-nav { gap: 0.375rem; }
            .report-nav-item { padding: 0.6rem 0.875rem; font-size: 0.85rem; }
            .report-nav-item span { display: none; }
            .filter-item { width: 100%; min-width: unset; }
            .filter-separator { display: none; }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🥚</div>
                <h1>EL REY DEL HUEVO</h1>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="/pos" class="nav-item"><i class="fas fa-cash-register"></i><span>Punto de Venta</span></a>
                <a href="/sales" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Ventas</span></a>
                <a href="/portfolio" class="nav-item"><i class="fas fa-hand-holding-usd"></i><span>Cartera</span></a>
                <a href="/expenses" class="nav-item"><i class="fas fa-money-bill-wave"></i><span>Gastos</span></a>
                <a href="/products" class="nav-item"><i class="fas fa-box"></i><span>Productos</span></a>
                <a href="/categories" class="nav-item"><i class="fas fa-tags"></i><span>Categorías</span></a>
                <a href="/clients" class="nav-item"><i class="fas fa-users"></i><span>Clientes</span></a>
                <a href="/warehouses" class="nav-item"><i class="fas fa-warehouse"></i><span>Bodegas</span></a>
                <a href="/inventory" class="nav-item"><i class="fas fa-boxes-stacked"></i><span>Inventario</span></a>
                <a href="/cash-register" class="nav-item"><i class="fas fa-calculator"></i><span>Caja</span></a>
                <a href="/reports" class="nav-item active"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-block" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Reportes</h1>
            </div>

            <!-- Report Type Navigation -->
            <nav class="report-nav">
                <button class="report-nav-item active" data-report="daily" onclick="selectReportType('daily')">
                    <i class="fas fa-calendar-day"></i><span>Diario</span>
                        </button>
                <button class="report-nav-item" data-report="sales" onclick="selectReportType('sales')">
                    <i class="fas fa-shopping-cart"></i><span>Ventas</span>
                        </button>
                <button class="report-nav-item" data-report="products" onclick="selectReportType('products')">
                    <i class="fas fa-box"></i><span>Productos</span>
                        </button>
                <button class="report-nav-item" data-report="expenses" onclick="selectReportType('expenses')">
                    <i class="fas fa-money-bill-wave"></i><span>Gastos</span>
                        </button>
                <button class="report-nav-item" data-report="credits" onclick="selectReportType('credits')">
                    <i class="fas fa-credit-card"></i><span>Créditos</span>
                        </button>
                <button class="report-nav-item" data-report="payments" onclick="selectReportType('payments')">
                    <i class="fas fa-hand-holding-usd"></i><span>Abonos</span>
                        </button>
                <button class="report-nav-item" data-report="inventory" onclick="selectReportType('inventory')">
                    <i class="fas fa-warehouse"></i><span>Inventario</span>
                        </button>
                <button class="report-nav-item" data-report="cash" onclick="selectReportType('cash')">
                    <i class="fas fa-calculator"></i><span>Cajas</span>
                        </button>
            </nav>

            <!-- Filters Panel -->
            <div class="filters-panel" id="filtersPanel">
                <div class="filters-header">
                    <h3><i class="fas fa-filter"></i> Filtros</h3>
                    <span id="filtersSummary" class="text-muted"></span>
                </div>
                <div class="filters-body">
                    <div class="filters-row">
                        <div class="filter-item" id="filterDateGroup"><label>Fecha</label><input type="date" id="filterDate" class="form-control" onchange="loadReport()"></div>
                        <div class="filter-item" id="filterDateTypeGroup" style="display: none;"><label>Período</label><select id="filterDateType" class="form-control" onchange="toggleDateFilters()"><option value="1d">1d</option><option value="7d">7d</option><option value="month">Mes</option><option value="range">Rango</option></select></div>
                        <div class="filter-item" id="filterMonthGroup" style="display: none;"><label>Mes</label><select id="filterMonth" class="form-control" onchange="onMonthChange()"></select></div>
                        <div class="filter-item" id="filterYearGroup" style="display: none;"><label>Año</label><select id="filterYear" class="form-control" onchange="onYearChange()"></select></div>
                        <div class="filter-item" id="filterStartDateGroup" style="display: none;"><label>Desde</label><input type="date" id="filterStartDate" class="form-control" onchange="loadReport()"></div>
                        <div class="filter-item" id="filterEndDateGroup" style="display: none;"><label>Hasta</label><input type="date" id="filterEndDate" class="form-control" onchange="loadReport()"></div>
                        <div class="filter-separator" id="dateSeparator" style="display: none;"></div>
                        <div class="filter-item" id="filterClientGroup" style="display: none;"><label>Cliente</label><select id="filterClient" class="form-control" onchange="loadReport()"><option value="">Todos</option></select></div>
                        <div class="filter-item" id="filterProductGroup" style="display: none;"><label>Producto</label><select id="filterProduct" class="form-control" onchange="loadReport()"><option value="">Todos</option></select></div>
                        <div class="filter-item" id="filterPaymentMethodGroup" style="display: none;"><label>Método Pago</label><select id="filterPaymentMethod" class="form-control" onchange="onPaymentMethodChange()"><option value="">Todos</option><option value="cash">Efectivo</option><option value="transfer">Transferencia</option><option value="credit">Crédito</option></select></div>
                        <div class="filter-item" id="filterTransferTypeGroup" style="display: none;"><label>Tipo Transfer.</label><select id="filterTransferType" class="form-control" onchange="loadReport()"><option value="">Todas</option><option value="nequi">Nequi</option><option value="bancolombia">Bancolombia</option><option value="davivienda">Davivienda</option></select></div>
                        <div class="filter-item" id="filterCreditStatusGroup" style="display: none;"><label>Estado</label><select id="filterCreditStatus" class="form-control" onchange="loadReport()"><option value="pending">Solo Pendientes</option><option value="all">Todos</option></select></div>
                    </div>
                </div>
            </div>

            <!-- Report Content -->
            <div id="reportContent"></div>
        </main>
    </div>

    <!-- Scripts: Utils, Auth, and Report Modules -->
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/reports/reportBase.js"></script>
    <script src="/js/reports/dailyReport.js"></script>
    <script src="/js/reports/salesReport.js"></script>
    <script src="/js/reports/productsReport.js"></script>
    <script src="/js/reports/expensesReport.js"></script>
    <script src="/js/reports/creditsReport.js"></script>
    <script src="/js/reports/paymentsReport.js"></script>
    <script src="/js/reports/inventoryReport.js"></script>
    <script src="/js/reports/cashReport.js"></script>
</body>
</html>
