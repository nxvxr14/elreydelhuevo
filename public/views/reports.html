<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - EL REY DEL HUEVO</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🥚</div>
                <h1>EL REY DEL HUEVO</h1>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="/pos" class="nav-item"><i class="fas fa-cash-register"></i><span>Punto de Venta</span></a>
                <a href="/sales" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Ventas</span></a>
                <a href="/expenses" class="nav-item"><i class="fas fa-money-bill-wave"></i><span>Gastos</span></a>
                <a href="/products" class="nav-item"><i class="fas fa-box"></i><span>Productos</span></a>
                <a href="/categories" class="nav-item"><i class="fas fa-tags"></i><span>Categorías</span></a>
                <a href="/clients" class="nav-item"><i class="fas fa-users"></i><span>Clientes</span></a>
                <a href="/inventory" class="nav-item"><i class="fas fa-warehouse"></i><span>Inventario</span></a>
                <a href="/cash-register" class="nav-item"><i class="fas fa-calculator"></i><span>Caja</span></a>
                <a href="/reports" class="nav-item active"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-block" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Reportes</h1>
            </div>

            <!-- Report Type Selector -->
            <div class="card mb-3">
                <div class="card-body">
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-primary" id="btnDailyReport" onclick="selectReportType('daily')">
                            <i class="fas fa-calendar-day"></i> Diario
                        </button>
                        <button class="btn btn-secondary" id="btnSalesReport" onclick="selectReportType('sales')">
                            <i class="fas fa-shopping-cart"></i> Ventas
                        </button>
                        <button class="btn btn-secondary" id="btnExpensesReport" onclick="selectReportType('expenses')">
                            <i class="fas fa-money-bill-wave"></i> Gastos
                        </button>
                        <button class="btn btn-secondary" id="btnCreditsReport" onclick="selectReportType('credits')">
                            <i class="fas fa-credit-card"></i> Créditos
                        </button>
                        <button class="btn btn-secondary" id="btnInventoryReport" onclick="selectReportType('inventory')">
                            <i class="fas fa-warehouse"></i> Inventario
                        </button>
                        <button class="btn btn-secondary" id="btnCashReport" onclick="selectReportType('cash')">
                            <i class="fas fa-calculator"></i> Cajas
                        </button>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-bar">
                <div class="filter-group" id="filterDateTypeGroup" style="display: none;">
                    <label for="filterDateType">Tipo:</label>
                    <select id="filterDateType" class="form-control" onchange="toggleDateFilters()">
                        <option value="month">Por Mes</option>
                        <option value="range">Rango de Fechas</option>
                    </select>
                </div>
                <div class="filter-group" id="filterDateGroup">
                    <label for="filterDate">Fecha:</label>
                    <input type="date" id="filterDate" class="form-control" onchange="loadReport()">
                </div>
                <div class="filter-group" id="filterMonthYearGroup" style="display: none;">
                    <label for="filterMonth">Mes:</label>
                    <select id="filterMonth" class="form-control" onchange="onMonthChange()">
                        <!-- Months loaded dynamically -->
                    </select>
                </div>
                <div class="filter-group" id="filterYearGroup" style="display: none;">
                    <label for="filterYear">Año:</label>
                    <select id="filterYear" class="form-control" onchange="onYearChange()">
                    </select>
                </div>
                <div class="filter-group" id="filterStartDateGroup" style="display: none;">
                    <label for="filterStartDate">Desde:</label>
                    <input type="date" id="filterStartDate" class="form-control" onchange="loadReport()">
                </div>
                <div class="filter-group" id="filterEndDateGroup" style="display: none;">
                    <label for="filterEndDate">Hasta:</label>
                    <input type="date" id="filterEndDate" class="form-control" onchange="loadReport()">
                </div>
                <div class="filter-group" id="filterClientGroup" style="display: none;">
                    <label for="filterClient">Cliente:</label>
                    <select id="filterClient" class="form-control" onchange="loadReport()">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="filter-group" id="filterProductGroup" style="display: none;">
                    <label for="filterProduct">Producto:</label>
                    <select id="filterProduct" class="form-control" onchange="loadReport()">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="filter-group" id="filterCreditStatusGroup" style="display: none;">
                    <label for="filterCreditStatus">Estado:</label>
                    <select id="filterCreditStatus" class="form-control" onchange="loadReport()">
                        <option value="pending">Solo Pendientes</option>
                        <option value="all">Todos</option>
                    </select>
                </div>
            </div>

            <!-- Report Content -->
            <div id="reportContent">
                <!-- Dynamic content -->
            </div>
        </main>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        let currentReportType = 'daily';
        let salesChart = null;
        let expensesChart = null;
        let availablePeriods = null;
        
        const MONTH_NAMES = [
            'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
            'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            // Set current date using Bogota timezone
            const today = Utils.getCurrentDate();
            document.getElementById('filterDate').value = today;
            
            // Set first and last day of current month
            document.getElementById('filterStartDate').value = Utils.getFirstDayOfMonth();
            document.getElementById('filterEndDate').value = today;
            
            // Initialize month/year selectors from available periods
            await initMonthYearSelectors();
            
            loadFilters();
            loadReport();
        });
        
        async function initMonthYearSelectors() {
            const now = new Date();
            const bogotaDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/Bogota' }));
            const currentMonth = bogotaDate.getMonth() + 1;
            const currentYear = bogotaDate.getFullYear();
            
            try {
                // Load available periods from server
                const result = await Utils.fetch('/api/dashboard/periods');
                availablePeriods = result;
                
                // Populate years (only years with data)
                const yearSelect = document.getElementById('filterYear');
                yearSelect.innerHTML = '';
                result.years.forEach(year => {
                    yearSelect.innerHTML += `<option value="${year}" ${parseInt(year) === currentYear ? 'selected' : ''}>${year}</option>`;
                });
                
                // Populate months for selected year
                updateMonthOptions();
                
            } catch (error) {
                console.error('Error loading periods:', error);
                // Fallback: show only current month/year
                const yearSelect = document.getElementById('filterYear');
                yearSelect.innerHTML = `<option value="${currentYear}" selected>${currentYear}</option>`;
                
                const monthSelect = document.getElementById('filterMonth');
                monthSelect.innerHTML = `<option value="${currentMonth}" selected>${MONTH_NAMES[currentMonth - 1]}</option>`;
            }
        }
        
        function updateMonthOptions() {
            const monthSelect = document.getElementById('filterMonth');
            const yearSelect = document.getElementById('filterYear');
            const selectedYear = yearSelect.value;
            
            const now = new Date();
            const bogotaDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/Bogota' }));
            const currentMonth = bogotaDate.getMonth() + 1;
            const currentYear = bogotaDate.getFullYear();
            
            monthSelect.innerHTML = '';
            
            if (availablePeriods && availablePeriods.monthsByYear[selectedYear]) {
                const months = availablePeriods.monthsByYear[selectedYear];
                months.forEach(month => {
                    const option = document.createElement('option');
                    option.value = month;
                    option.textContent = MONTH_NAMES[month - 1];
                    // Select current month if in current year, otherwise first available month
                    if (parseInt(selectedYear) === currentYear && month === currentMonth) {
                        option.selected = true;
                    } else if (months.indexOf(month) === 0) {
                        option.selected = true;
                    }
                    monthSelect.appendChild(option);
                });
            } else {
                // Fallback
                const option = document.createElement('option');
                option.value = currentMonth;
                option.textContent = MONTH_NAMES[currentMonth - 1];
                option.selected = true;
                monthSelect.appendChild(option);
            }
        }
        
        function onYearChange() {
            // Update month options when year changes
            updateMonthOptions();
            updateDateRange();
            loadReport();
        }
        
        function onMonthChange() {
            updateDateRange();
            loadReport();
        }
        
        function updateDateRange() {
            const month = parseInt(document.getElementById('filterMonth').value);
            const year = parseInt(document.getElementById('filterYear').value);
            
            // Calculate start and end of month
            const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
            const lastDay = new Date(year, month, 0).getDate();
            const endDate = `${year}-${String(month).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
            
            document.getElementById('filterStartDate').value = startDate;
            document.getElementById('filterEndDate').value = endDate;
        }
        
        function toggleDateFilters() {
            const dateType = document.getElementById('filterDateType').value;
            const isRange = dateType === 'range';
            
            document.getElementById('filterMonthYearGroup').style.display = isRange ? 'none' : 'flex';
            document.getElementById('filterYearGroup').style.display = isRange ? 'none' : 'flex';
            document.getElementById('filterStartDateGroup').style.display = isRange ? 'flex' : 'none';
            document.getElementById('filterEndDateGroup').style.display = isRange ? 'flex' : 'none';
            
            if (!isRange) {
                updateDateRange();
            }
            loadReport();
        }

        async function loadFilters() {
            try {
                const [clientsResult, productsResult] = await Promise.all([
                    Utils.fetch('/api/clients'),
                    Utils.fetch('/api/products')
                ]);
                
                const clientSelect = document.getElementById('filterClient');
                clientsResult.clients.forEach(c => {
                    clientSelect.innerHTML += `<option value="${c.id}">${Utils.escapeHtml(c.name)}</option>`;
                });
                
                const productSelect = document.getElementById('filterProduct');
                productsResult.products.forEach(p => {
                    productSelect.innerHTML += `<option value="${p.id}">${Utils.escapeHtml(p.name)}</option>`;
                });
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }

        function selectReportType(type) {
            currentReportType = type;
            
            // Reset all buttons to secondary
            const allButtons = document.querySelectorAll('#btnDailyReport, #btnSalesReport, #btnExpensesReport, #btnCreditsReport, #btnInventoryReport, #btnCashReport');
            allButtons.forEach(btn => {
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-secondary');
            });
            
            // Set active button to primary
            const activeBtn = document.getElementById(`btn${type.charAt(0).toUpperCase() + type.slice(1)}Report`);
            if (activeBtn) {
                activeBtn.classList.remove('btn-secondary');
                activeBtn.classList.add('btn-primary');
            }
            
            // Show/hide filters based on report type
            const showDate = type === 'daily';
            const showRange = type === 'sales' || type === 'expenses' || type === 'inventory' || type === 'cash' || type === 'credits';
            const showClient = type === 'sales' || type === 'credits';
            const showProduct = type === 'sales' || type === 'inventory';
            const showCreditStatus = type === 'credits';
            
            document.getElementById('filterDateGroup').style.display = showDate ? 'flex' : 'none';
            document.getElementById('filterDateTypeGroup').style.display = showRange ? 'flex' : 'none';
            
            if (showRange) {
                const dateType = document.getElementById('filterDateType').value;
                const isRange = dateType === 'range';
                document.getElementById('filterMonthYearGroup').style.display = isRange ? 'none' : 'flex';
                document.getElementById('filterYearGroup').style.display = isRange ? 'none' : 'flex';
                document.getElementById('filterStartDateGroup').style.display = isRange ? 'flex' : 'none';
                document.getElementById('filterEndDateGroup').style.display = isRange ? 'flex' : 'none';
            } else {
                document.getElementById('filterMonthYearGroup').style.display = 'none';
                document.getElementById('filterYearGroup').style.display = 'none';
                document.getElementById('filterStartDateGroup').style.display = 'none';
                document.getElementById('filterEndDateGroup').style.display = 'none';
            }
            
            document.getElementById('filterClientGroup').style.display = showClient ? 'flex' : 'none';
            document.getElementById('filterProductGroup').style.display = showProduct ? 'flex' : 'none';
            document.getElementById('filterCreditStatusGroup').style.display = showCreditStatus ? 'flex' : 'none';
            
            loadReport();
        }

        async function loadReport() {
            try {
                Utils.showLoading();
                
                switch (currentReportType) {
                    case 'daily':
                        await loadDailyReport();
                        break;
                    case 'sales':
                        await loadSalesReport();
                        break;
                    case 'expenses':
                        await loadExpensesReport();
                        break;
                    case 'credits':
                        await loadCreditsReport();
                        break;
                    case 'inventory':
                        await loadInventoryReport();
                        break;
                    case 'cash':
                        await loadCashReport();
                        break;
                }
            } catch (error) {
                Utils.showToast('Error al cargar el reporte', 'danger');
                console.error(error);
            } finally {
                Utils.hideLoading();
            }
        }

        async function loadDailyReport() {
            const date = document.getElementById('filterDate').value;
            const result = await Utils.fetch(`/api/reports/daily?date=${date}`);
            const report = result.report;
            
            const content = document.getElementById('reportContent');
            content.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon sales"><i class="fas fa-shopping-cart"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(report.sales.stats.totalSales)}</h3>
                            <p>Ventas (${report.sales.count} transacciones)</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon expenses"><i class="fas fa-arrow-down"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(report.expenses.stats.totalExpenses)}</h3>
                            <p>Gastos (${report.expenses.count} registros)</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon profit"><i class="fas fa-coins"></i></div>
                        <div class="stat-info">
                            <h3 class="${report.profit >= 0 ? 'text-success' : 'text-danger'}">${Utils.formatCurrency(report.profit)}</h3>
                            <p>Utilidad del Día</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon inventory"><i class="fas fa-warehouse"></i></div>
                        <div class="stat-info">
                            <h3>${report.inventory.stats.totalEntries}</h3>
                            <p>Entradas de Inventario</p>
                        </div>
                    </div>
                </div>
                
                ${report.cashRegister ? `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Caja del Día</h3>
                        </div>
                        <div class="card-body">
                            <p><strong>Estado:</strong> <span class="badge ${report.cashRegister.status === 'closed' ? 'badge-success' : 'badge-info'}">${report.cashRegister.status === 'closed' ? 'Cerrada' : 'Abierta'}</span></p>
                            <p><strong>Dinero inicial:</strong> ${Utils.formatCurrency(report.cashRegister.initialAmount)}</p>
                            <p><strong>Dinero final:</strong> ${Utils.formatCurrency(report.cashRegister.expectedAmount)}</p>
                        </div>
                    </div>
                ` : `
                    <div class="card">
                        <div class="card-body">
                            <p class="text-muted">No hay registro de caja para este día.</p>
                        </div>
                    </div>
                `}
            `;
        }

        async function loadSalesReport() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const clientId = document.getElementById('filterClient').value;
            const productId = document.getElementById('filterProduct').value;
            
            let url = `/api/reports/sales?startDate=${startDate}&endDate=${endDate}`;
            if (clientId) url += `&clientId=${clientId}`;
            if (productId) url += `&productId=${productId}`;
            
            const result = await Utils.fetch(url);
            const report = result.report;
            
            // Prepare chart data
            const labels = Object.keys(report.salesByDay).sort();
            const data = labels.map(date => report.salesByDay[date]);
            
            const content = document.getElementById('reportContent');
            content.innerHTML = `
                <div class="stats-grid mb-3">
                    <div class="stat-card">
                        <div class="stat-icon sales"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(report.stats.totalSales)}</h3>
                            <p>Total de Ventas</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info"><i class="fas fa-receipt"></i></div>
                        <div class="stat-info">
                            <h3>${report.stats.salesCount}</h3>
                            <p>Número de Ventas</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon profit"><i class="fas fa-calculator"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(report.stats.averageSale)}</h3>
                            <p>Promedio por Venta</p>
                        </div>
                    </div>
                </div>
                
                <div class="chart-container mb-3">
                    <div class="chart-header"><h3>Ventas por Día</h3></div>
                    <canvas id="salesReportChart"></canvas>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Listado de Ventas</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Referencia</th>
                                        <th>Cliente</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${report.sales.length === 0 ? '<tr><td colspan="4" class="text-center">No hay ventas</td></tr>' :
                                        report.sales.map(s => `
                                            <tr>
                                                <td>${Utils.formatDate(s.date)}</td>
                                                <td><code>${s.reference}</code></td>
                                                <td>${Utils.escapeHtml(s.clientName)}</td>
                                                <td><strong>${Utils.formatCurrency(s.total)}</strong></td>
                                            </tr>
                                        `).join('')
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            // Create chart
            if (labels.length > 0) {
                const ctx = document.getElementById('salesReportChart').getContext('2d');
                if (salesChart) salesChart.destroy();
                salesChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(d => Utils.formatDate(d)),
                        datasets: [{
                            label: 'Ventas',
                            data: data,
                            backgroundColor: 'rgba(34, 197, 94, 0.5)',
                            borderColor: 'rgb(34, 197, 94)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            }
        }

        async function loadExpensesReport() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            
            const result = await Utils.fetch(`/api/reports/expenses?startDate=${startDate}&endDate=${endDate}`);
            const report = result.report;
            
            const labels = Object.keys(report.expensesByDay).sort();
            const data = labels.map(date => report.expensesByDay[date]);
            
            const content = document.getElementById('reportContent');
            content.innerHTML = `
                <div class="stats-grid mb-3">
                    <div class="stat-card">
                        <div class="stat-icon expenses"><i class="fas fa-arrow-down"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(report.stats.totalExpenses)}</h3>
                            <p>Total de Gastos</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info"><i class="fas fa-receipt"></i></div>
                        <div class="stat-info">
                            <h3>${report.stats.expensesCount}</h3>
                            <p>Número de Gastos</p>
                        </div>
                    </div>
                </div>
                
                <div class="chart-container mb-3">
                    <div class="chart-header"><h3>Gastos por Día</h3></div>
                    <canvas id="expensesReportChart"></canvas>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Listado de Gastos</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Referencia</th>
                                        <th>Concepto</th>
                                        <th>Monto</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${report.expenses.length === 0 ? '<tr><td colspan="4" class="text-center">No hay gastos</td></tr>' :
                                        report.expenses.map(e => `
                                            <tr>
                                                <td>${Utils.formatDate(e.date)}</td>
                                                <td><code>${e.reference}</code></td>
                                                <td>${Utils.escapeHtml(e.concept)}</td>
                                                <td><strong class="text-danger">${Utils.formatCurrency(e.amount)}</strong></td>
                                            </tr>
                                        `).join('')
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            if (labels.length > 0) {
                const ctx = document.getElementById('expensesReportChart').getContext('2d');
                if (expensesChart) expensesChart.destroy();
                expensesChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(d => Utils.formatDate(d)),
                        datasets: [{
                            label: 'Gastos',
                            data: data,
                            backgroundColor: 'rgba(239, 68, 68, 0.5)',
                            borderColor: 'rgb(239, 68, 68)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
        }

        async function loadInventoryReport() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const productId = document.getElementById('filterProduct').value;
            
            let url = `/api/reports/inventory?startDate=${startDate}&endDate=${endDate}`;
            if (productId) url += `&productId=${productId}`;
            
            const result = await Utils.fetch(url);
            const report = result.report;
            
            const content = document.getElementById('reportContent');
            content.innerHTML = `
                <div class="stats-grid mb-3">
                    <div class="stat-card">
                        <div class="stat-icon inventory"><i class="fas fa-arrow-up"></i></div>
                        <div class="stat-info">
                            <h3>${report.stats.totalEntries}</h3>
                            <p>Unidades Ingresadas</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info"><i class="fas fa-clipboard-list"></i></div>
                        <div class="stat-info">
                            <h3>${report.stats.entriesCount}</h3>
                            <p>Entradas Registradas</p>
                        </div>
                    </div>
                </div>
                
                <div class="card mb-3">
                    <div class="card-header">
                        <h3 class="card-title">Stock Actual</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Producto</th>
                                        <th>Stock</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${report.currentStock.map(p => `
                                        <tr>
                                            <td>${p.id}</td>
                                            <td>${Utils.escapeHtml(p.name)}</td>
                                            <td>
                                                <span class="badge ${p.stock === 0 ? 'badge-danger' : p.stock < 10 ? 'badge-warning' : 'badge-success'}">
                                                    ${p.stock}
                                                </span>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Historial de Entradas</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Referencia</th>
                                        <th>Producto</th>
                                        <th>Cantidad</th>
                                        <th>Origen</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${report.entries.length === 0 ? '<tr><td colspan="5" class="text-center">No hay entradas</td></tr>' :
                                        report.entries.map(e => `
                                            <tr>
                                                <td>${Utils.formatDate(e.date)}</td>
                                                <td><code>${e.reference}</code></td>
                                                <td>${Utils.escapeHtml(e.productName)}</td>
                                                <td><span class="badge badge-success">+${e.quantity}</span></td>
                                                <td>${Utils.escapeHtml(e.origin)}</td>
                                            </tr>
                                        `).join('')
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadCreditsReport() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const clientId = document.getElementById('filterClient').value;
            const creditStatus = document.getElementById('filterCreditStatus').value;
            
            // Get all credit sales
            const result = await Utils.fetch('/api/sales?startDate=' + startDate + '&endDate=' + endDate);
            let allSales = result.sales || [];
            
            // Filter by payment method = credit
            let creditSales = allSales.filter(s => s.paymentMethod === 'credit');
            
            // Filter by status
            if (creditStatus === 'pending') {
                creditSales = creditSales.filter(s => s.status === 'pending');
            }
            
            // Filter by client
            if (clientId) {
                creditSales = creditSales.filter(s => s.clientId === parseInt(clientId));
            }
            
            // Sort by date descending
            creditSales.sort((a, b) => b.date.localeCompare(a.date));
            
            // Calculate totals
            const totalPending = creditSales.reduce((sum, s) => sum + (s.pendingAmount || 0), 0);
            const totalSalesValue = creditSales.reduce((sum, s) => sum + s.total, 0);
            const totalPaid = creditSales.reduce((sum, s) => sum + (s.paidAmount || 0), 0);
            const pendingCount = creditSales.filter(s => s.status === 'pending').length;
            
            const content = document.getElementById('reportContent');
            content.innerHTML = `
                <div class="stats-grid mb-3">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(245, 158, 11, 0.15);"><i class="fas fa-credit-card" style="color: var(--warning);"></i></div>
                        <div class="stat-info">
                            <h3 class="text-warning">${Utils.formatCurrency(totalPending)}</h3>
                            <p>Total Por Cobrar</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info"><i class="fas fa-file-invoice-dollar"></i></div>
                        <div class="stat-info">
                            <h3>${creditSales.length}</h3>
                            <p>Créditos (${pendingCount} pendientes)</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon sales"><i class="fas fa-hand-holding-usd"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(totalPaid)}</h3>
                            <p>Total Abonado</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon profit"><i class="fas fa-coins"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(totalSalesValue)}</h3>
                            <p>Valor Total Créditos</p>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Créditos ${creditStatus === 'pending' ? 'Pendientes de Cobro' : '(Todos)'}</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Referencia</th>
                                        <th>Cliente</th>
                                        <th>Total Venta</th>
                                        <th>Abonado</th>
                                        <th>Pendiente</th>
                                        <th>Estado</th>
                                        <th>Acc.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${creditSales.length === 0 ? '<tr><td colspan="8" class="text-center">No hay créditos en este período</td></tr>' :
                                        creditSales.map(s => `
                                            <tr>
                                                <td>${Utils.formatDate(s.date)}</td>
                                                <td><code>${s.reference.substring(0, 8)}...</code></td>
                                                <td>${Utils.escapeHtml(s.clientName)}</td>
                                                <td>${Utils.formatCurrency(s.total)}</td>
                                                <td class="text-success">${Utils.formatCurrency(s.paidAmount || 0)}</td>
                                                <td><strong class="${s.pendingAmount > 0 ? 'text-warning' : 'text-success'}">${Utils.formatCurrency(s.pendingAmount || 0)}</strong></td>
                                                <td>${s.status === 'pending' ? '<span class="badge badge-warning">Pendiente</span>' : '<span class="badge badge-success">Pagado</span>'}</td>
                                                <td>
                                                    <a href="/sales" class="btn btn-sm btn-info" title="Ver en ventas">
                                                        <i class="fas fa-external-link-alt"></i>
                                                    </a>
                                                </td>
                                            </tr>
                                        `).join('')
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadCashReport() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            
            const result = await Utils.fetch(`/api/reports/cash?startDate=${startDate}&endDate=${endDate}`);
            const report = result.report;
            
            const content = document.getElementById('reportContent');
            content.innerHTML = `
                <div class="stats-grid mb-3">
                    <div class="stat-card">
                        <div class="stat-icon sales"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(report.totals.totalSales)}</h3>
                            <p>Total Ventas</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon expenses"><i class="fas fa-arrow-down"></i></div>
                        <div class="stat-info">
                            <h3>${Utils.formatCurrency(report.totals.totalExpenses)}</h3>
                            <p>Total Gastos</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon profit"><i class="fas fa-coins"></i></div>
                        <div class="stat-info">
                            <h3 class="${(report.totals.totalSales - report.totals.totalExpenses) >= 0 ? 'text-success' : 'text-danger'}">
                                ${Utils.formatCurrency(report.totals.totalSales - report.totals.totalExpenses)}
                            </h3>
                            <p>Utilidad Total</p>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Historial de Cajas</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Referencia</th>
                                        <th>Inicial</th>
                                        <th>Ventas</th>
                                        <th>Gastos</th>
                                        <th>Final</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${report.registers.length === 0 ? '<tr><td colspan="6" class="text-center">No hay registros</td></tr>' :
                                        report.registers.map(r => `
                                            <tr>
                                                <td>${Utils.formatDate(r.date)}</td>
                                                <td><code>${r.reference}</code></td>
                                                <td>${Utils.formatCurrency(r.initialAmount)}</td>
                                                <td class="text-success">${Utils.formatCurrency(r.totalSales)}</td>
                                                <td class="text-danger">${Utils.formatCurrency(r.totalExpenses)}</td>
                                                <td><strong>${Utils.formatCurrency(r.expectedAmount)}</strong></td>
                                            </tr>
                                        `).join('')
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
