<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - EL REY DEL HUEVO</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🥚</div>
                <h1>EL REY DEL HUEVO</h1>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/pos" class="nav-item">
                    <i class="fas fa-cash-register"></i>
                    <span>Punto de Venta</span>
                </a>
                <a href="/sales" class="nav-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Ventas</span>
                </a>
                <a href="/expenses" class="nav-item">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Gastos</span>
                </a>
                <a href="/products" class="nav-item active">
                    <i class="fas fa-box"></i>
                    <span>Productos</span>
                </a>
                <a href="/categories" class="nav-item">
                    <i class="fas fa-tags"></i>
                    <span>Categorías</span>
                </a>
                <a href="/clients" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Clientes</span>
                </a>
                <a href="/inventory" class="nav-item">
                    <i class="fas fa-warehouse"></i>
                    <span>Inventario</span>
                </a>
                <a href="/cash-register" class="nav-item">
                    <i class="fas fa-calculator"></i>
                    <span>Caja</span>
                </a>
                <a href="/reports" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reportes</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-block" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Productos</h1>
                <div class="page-actions">
                    <button class="btn btn-primary" onclick="showProductModal()">
                        <i class="fas fa-plus"></i>
                        Nuevo Producto
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label for="filterCategory">Categoría:</label>
                    <select id="filterCategory" class="form-control" onchange="loadProducts()">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterSearch">Buscar:</label>
                    <input type="text" id="filterSearch" class="form-control" 
                           placeholder="Nombre del producto..." oninput="filterProducts()">
                </div>
            </div>

            <!-- Products Table -->
            <div class="card">
                <div class="card-body">
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Stock</th>
                                    <th>Precio</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="productsTable">
                                <tr>
                                    <td colspan="6" class="text-center">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="productsPagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="productModalTitle">Nuevo Producto</h3>
                <button class="modal-close" onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm" onsubmit="event.preventDefault(); saveProduct();">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label for="productName">Nombre *</label>
                        <input type="text" id="productName" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="productCategory">Categoría *</label>
                        <select id="productCategory" class="form-control" required>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="productPrice">Precio *</label>
                        <input type="text" id="productPrice" class="form-control" 
                               placeholder="0" required>
                    </div>
                    
                    <div class="form-group" id="stockGroup">
                        <label for="productStock">Stock Inicial</label>
                        <input type="text" id="productStock" class="form-control" 
                               placeholder="0">
                        <small id="stockHelpText" class="form-text text-muted" style="display: none; color: var(--text-secondary); font-size: 0.85em; margin-top: 5px;">
                            <i class="fas fa-info-circle"></i> El stock solo se puede modificar desde <a href="/inventory" style="color: var(--primary);">Inventario</a> (entradas/salidas).
                        </small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProductModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveProduct()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/products.js"></script>
</body>
</html>
