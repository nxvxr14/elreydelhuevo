<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodegas - EL REY DEL HUEVO</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .warehouse-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .warehouse-card { background: var(--bg-card); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--border-color); transition: all 0.3s; cursor: pointer; }
        .warehouse-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.15); }
        .warehouse-card.default { border-left: 4px solid var(--primary); }
        .warehouse-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .warehouse-name { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin: 0; }
        .warehouse-badge { background: var(--primary); color: var(--bg-dark); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .warehouse-stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; }
        .warehouse-stat { display: flex; flex-direction: column; }
        .warehouse-stat-label { color: var(--text-secondary); font-size: 0.85rem; }
        .warehouse-stat-value { color: var(--text-primary); font-size: 1.5rem; font-weight: 700; }
        .warehouse-description { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; }
        .warehouse-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .products-list { margin-top: 1.5rem; }
        .products-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); }
        .product-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .product-row:last-child { border-bottom: none; }
        .product-info { display: flex; flex-direction: column; }
        .product-name { color: var(--text-primary); font-weight: 500; }
        .product-category { color: var(--text-secondary); font-size: 0.85rem; }
        .product-stock { font-weight: 600; color: var(--primary); }
        .empty-products { text-align: center; padding: 2rem; color: var(--text-secondary); }
        .back-btn { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); cursor: pointer; margin-bottom: 1rem; }
        .back-btn:hover { color: var(--primary); }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🥚</div>
                <h1>EL REY DEL HUEVO</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="/pos" class="nav-item"><i class="fas fa-cash-register"></i><span>Punto de Venta</span></a>
                <a href="/sales" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Ventas</span></a>
                <a href="/portfolio" class="nav-item"><i class="fas fa-hand-holding-usd"></i><span>Cartera</span></a>
                <a href="/expenses" class="nav-item"><i class="fas fa-money-bill-wave"></i><span>Gastos</span></a>
                <a href="/products" class="nav-item"><i class="fas fa-box"></i><span>Productos</span></a>
                <a href="/categories" class="nav-item"><i class="fas fa-tags"></i><span>Categorías</span></a>
                <a href="/clients" class="nav-item"><i class="fas fa-users"></i><span>Clientes</span></a>
                <a href="/warehouses" class="nav-item active"><i class="fas fa-warehouse"></i><span>Bodegas</span></a>
                <a href="/inventory" class="nav-item"><i class="fas fa-boxes-stacked"></i><span>Inventario</span></a>
                <a href="/cash-register" class="nav-item"><i class="fas fa-calculator"></i><span>Caja</span></a>
                <a href="/reports" class="nav-item"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-block" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
            </div>
        </aside>

        <main class="main-content">
            <div id="warehousesList">
                <div class="page-header">
                    <h1 class="page-title">Bodegas</h1>
                    <div class="page-actions">
                        <button class="btn btn-primary" onclick="showWarehouseModal()"><i class="fas fa-plus"></i> Nueva Bodega</button>
                    </div>
                </div>
                <div class="warehouse-cards" id="warehousesContainer">
                    <div class="text-center" style="grid-column: 1 / -1; padding: 3rem;"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>
                </div>
            </div>

            <div id="warehouseDetail" style="display: none;">
                <div class="back-btn" onclick="showWarehousesList()"><i class="fas fa-arrow-left"></i> Volver a bodegas</div>
                <div class="page-header">
                    <h1 class="page-title" id="detailWarehouseName">Bodega</h1>
                </div>
                <div class="card">
                    <div class="card-body">
                        <div class="products-list">
                            <div class="products-list-header">
                                <h3>Productos en bodega</h3>
                                <span id="detailTotalStock" class="warehouse-stat-value"></span>
                            </div>
                            <div id="warehouseProductsList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Warehouse Modal -->
    <div class="modal-overlay" id="warehouseModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="warehouseModalTitle">Nueva Bodega</h3>
                <button class="modal-close" onclick="closeWarehouseModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="warehouseForm" onsubmit="event.preventDefault(); saveWarehouse();">
                    <input type="hidden" id="warehouseId">
                    <div class="form-group">
                        <label for="warehouseName">Nombre *</label>
                        <input type="text" id="warehouseName" class="form-control" required placeholder="Ej: Bodega Central">
                    </div>
                    <div class="form-group">
                        <label for="warehouseDescription">Descripción</label>
                        <textarea id="warehouseDescription" class="form-control" rows="3" placeholder="Descripción opcional de la bodega"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeWarehouseModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveWarehouse()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/warehouses.js"></script>
</body>
</html>
